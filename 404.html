<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join Game — Captains</title>
  <meta name="description" content="You've been invited to play Captains — the video challenge game for friend groups.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 80px 24px;
      background: #fafaf8;
      color: #1a1a1a;
      min-height: 100vh;
    }
    .crown { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #666; font-size: 16px; line-height: 1.5; margin-bottom: 24px; max-width: 320px; margin-left: auto; margin-right: auto; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #1a1a1a;
      color: white;
      text-decoration: none;
      border-radius: 24px;
      font-weight: 600;
      font-size: 16px;
    }
    .btn:hover { background: #333; }
    .code {
      display: inline-block;
      margin-bottom: 24px;
      padding: 8px 16px;
      background: #f0f0ee;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      color: #999;
    }
    .links { margin-top: 48px; }
    .links a { color: #999; font-size: 13px; text-decoration: none; margin: 0 12px; }
    .links a:hover { color: #666; }
  </style>
</head>
<body>
  <div class="crown">👑</div>
  <div id="content"></div>
  <div class="links">
    <a href="/privacy-policy">Privacy</a>
    <a href="/terms-of-use">Terms</a>
    <a href="/support">Support</a>
  </div>
  <script>
    const path = window.location.pathname;
    const match = path.match(/\/join\/([A-Za-z0-9]+)/);
    const content = document.getElementById('content');

    if (!match) {
      window.location.href = '/';
    } else {
      const code = match[1];
      const stored = sessionStorage.getItem('captains_access');

      if (stored === 'granted') {
        showInvite(code);
      } else {
        showGate(code);
      }
    }

    function showGate(code) {
      content.innerHTML =
        '<h1>You\u2019ve been invited to play Captains</h1>' +
        '<p>Captains is in early access. Enter the password to continue.</p>' +
        '<input id="pw" type="password" placeholder="Password" style="padding:12px 16px;border:1px solid #ddd;border-radius:12px;font-size:16px;width:100%;max-width:280px;text-align:center;margin-bottom:16px;">' +
        '<br><button class="btn" onclick="checkPassword(\'' + code + '\')" style="border:none;cursor:pointer;">Continue</button>' +
        '<div id="error" style="color:#c00;font-size:13px;margin-top:12px;"></div>';
      document.getElementById('pw').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') checkPassword(code);
      });
    }

    async function digestMessage(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function checkPassword(code) {
      const pw = document.getElementById('pw').value;
      if (await digestMessage(pw) === 'dc0e01752a6ec375e6deaca4425ef473dc0bb9ab9ba4ca8d4a32e7514d7fcf2a') {
        sessionStorage.setItem('captains_access', 'granted');
        showInvite(code);
      } else {
        document.getElementById('error').textContent = 'Incorrect password';
      }
    }

    function showInvite(code) {
      content.innerHTML =
        '<h1>You\u2019ve been invited to play Captains</h1>' +
        '<p>The video challenge game for friend groups. Download the app to join this game.</p>' +
        '<div class="code">Invite code: ' + code + '</div>' +
        '<br><a class="btn" href="https://testflight.apple.com/join/vktfZ2u2">Download on TestFlight</a>';
    }
  </script>
</body>
</html>
