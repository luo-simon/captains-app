<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Join Game — Captains</title>
  <meta name="description" content="You've been invited to play Captains. The video challenge game for friend groups.">
  <meta property="og:title" content="You've been invited to play Captains">
  <meta property="og:description" content="Set a video dare. Race to respond. Last one standing wins.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf8;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --gold-light: #FFF3C4;
      --surface: #ffffff;
      --font: 'Bricolage Grotesque', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
    }

    .crown {
      font-size: 56px;
      margin-bottom: 12px;
      animation: crownDrop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes crownDrop {
      0% { transform: translateY(-30px) scale(0.8); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
      animation: fadeUp 0.6s ease both 0.15s;
    }

    .subtitle {
      font-size: 17px;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: 32px;
      max-width: 320px;
      animation: fadeUp 0.6s ease both 0.3s;
    }

    .code-box {
      display: inline-block;
      padding: 10px 24px;
      background: var(--gold-light);
      border-radius: 12px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 4px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s ease both 0.4s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--text);
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-family: var(--font);
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, background 0.2s;
      animation: fadeUp 0.6s ease both 0.5s;
    }

    .btn:hover { transform: scale(1.03); background: #333; }

    .badge-icon { font-size: 22px; }
    .badge-text-small { font-size: 11px; font-weight: 400; opacity: 0.8; }
    .badge-text-large { font-size: 16px; font-weight: 700; }

    .steps {
      margin-top: 48px;
      text-align: left;
      max-width: 300px;
      animation: fadeUp 0.6s ease both 0.6s;
    }

    .steps-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .step-icon { font-size: 18px; flex-shrink: 0; }

    .step-text {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .links {
      margin-top: 48px;
      display: flex;
      gap: 24px;
      animation: fadeUp 0.6s ease both 0.7s;
    }

    .links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .links a:hover { color: var(--text); }

    @keyframes fadeUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="crown">👑</div>
  <h1>You've been invited</h1>
  <p class="subtitle">Someone wants you in their Captains game. Download the app to join.</p>
  <div id="code-box" class="code-box" style="display:none;"></div>
  <a class="btn" href="#">
    <span class="badge-icon">&#63743;</span>
    <span>
      <span class="badge-text-small">Coming soon on the</span><br>
      <span class="badge-text-large">App Store</span>
    </span>
  </a>

  <div class="steps">
    <div class="steps-title">How it works</div>
    <div class="step">
      <span class="step-icon">👑</span>
      <span class="step-text">The Captain sets a video challenge</span>
    </div>
    <div class="step">
      <span class="step-icon">🎬</span>
      <span class="step-text">Everyone races to film their response</span>
    </div>
    <div class="step">
      <span class="step-icon">⚡</span>
      <span class="step-text">Slowest player gets eliminated</span>
    </div>
    <div class="step">
      <span class="step-icon">🏆</span>
      <span class="step-text">Last one standing wins</span>
    </div>
  </div>

  <div class="links">
    <a href="/privacy-policy.html">Privacy</a>
    <a href="/terms-of-use.html">Terms</a>
    <a href="/support.html">Support</a>
  </div>

  <script>
    const path = window.location.pathname;
    const match = path.match(/\/join\/([A-Za-z0-9]+)/);
    if (match) {
      const codeBox = document.getElementById('code-box');
      codeBox.textContent = match[1].toUpperCase();
      codeBox.style.display = 'inline-block';
    } else if (!path.includes('/join')) {
      window.location.href = '/';
    }
  </script>

</body>
</html>
