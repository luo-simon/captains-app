<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captains</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 80px 24px;
      background: #fafaf8;
      color: #1a1a1a;
      min-height: 100vh;
    }
    .crown { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    p { color: #666; font-size: 16px; line-height: 1.5; margin-bottom: 32px; max-width: 360px; margin-left: auto; margin-right: auto; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #1a1a1a;
      color: white;
      text-decoration: none;
      border-radius: 24px;
      font-weight: 600;
      font-size: 16px;
    }
    .btn:hover { background: #333; }
    .links { margin-top: 48px; }
    .links a { color: #999; font-size: 13px; text-decoration: none; margin: 0 12px; }
    .links a:hover { color: #666; }
  </style>
</head>
<body>
  <div class="crown">👑</div>
  <h1>Captains</h1>
  <p>The video challenge game for friend groups. Be fast or be eliminated.</p>
  <div id="gate">
    <p style="color:#999;font-size:14px;margin-bottom:16px;">Captains is in early access.</p>
    <input id="pw" type="password" placeholder="Password" style="padding:12px 16px;border:1px solid #ddd;border-radius:12px;font-size:16px;width:100%;max-width:280px;text-align:center;margin-bottom:16px;">
    <br><button class="btn" onclick="checkPw()" style="border:none;cursor:pointer;">Continue</button>
    <div id="error" style="color:#c00;font-size:13px;margin-top:12px;"></div>
  </div>
  <div id="download" style="display:none;">
    <a class="btn" href="https://testflight.apple.com/join/vktfZ2u2">Download on TestFlight</a>
  </div>
  <script>
    if (sessionStorage.getItem('captains_access') === 'granted') {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('download').style.display = 'block';
    }
    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPw();
    });
    function checkPw() {
      if (document.getElementById('pw').value === 'captains123') {
        sessionStorage.setItem('captains_access', 'granted');
        document.getElementById('gate').style.display = 'none';
        document.getElementById('download').style.display = 'block';
      } else {
        document.getElementById('error').textContent = 'Incorrect password';
      }
    }
  </script>
  <div class="links">
    <a href="/privacy-policy">Privacy</a>
    <a href="/terms-of-use">Terms</a>
    <a href="/support">Support</a>
  </div>
</body>
</html>
