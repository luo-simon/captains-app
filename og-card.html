<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFDA47;
      font-family: 'Bricolage Grotesque', sans-serif;
      overflow: hidden;
    }
    .card {
      text-align: center;
    }
    .crown {
      font-size: 96px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 120px;
      font-weight: 800;
      letter-spacing: -5px;
      color: #1a1a1a;
      margin-bottom: 16px;
    }
    .tagline {
      font-size: 36px;
      font-weight: 700;
      color: #1a1a1a;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="crown">👑</div>
    <div class="title">Captains</div>
    <div class="tagline">Video challenges for friend groups</div>
  </div>
</body>
</html>
