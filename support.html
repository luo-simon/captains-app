<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support — Captains</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Bricolage Grotesque', sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .header { background: #FFDA47; padding: 32px 24px; text-align: center; }
    .header a { text-decoration: none; color: #1a1a1a; font-size: 20px; font-weight: 800; }
    .header span { margin-right: 8px; }
    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
    p { font-size: 16px; line-height: 1.5; color: #666; margin-bottom: 32px; }
    .email-link {
      display: inline-block;
      padding: 14px 28px;
      background: #1a1a1a;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, background 0.2s;
    }
    .email-link:hover { transform: scale(1.03); background: #333; }
    .footer-links { text-align: center; padding: 32px 24px; border-top: 1px solid #eee; position: fixed; bottom: 0; left: 0; right: 0; }
    .footer-links a { color: #666; text-decoration: none; font-size: 13px; font-weight: 500; margin: 0 12px; }
    .footer-links a:hover { color: #1a1a1a; }
  </style>
</head>
<body>
  <div class="header">
    <a href="/"><span>👑</span>Captains</a>
  </div>
  <div class="content">
    <div class="icon">💬</div>
    <h1>Support</h1>
    <p>Need help? Have feedback? Found a bug?<br>We'd love to hear from you.</p>
    <a class="email-link" href="mailto:feedback@simonluo.com">feedback@simonluo.com</a>
  </div>
  <div class="footer-links">
    <a href="/">Home</a>
    <a href="/privacy-policy.html">Privacy</a>
    <a href="/terms-of-use.html">Terms</a>
  </div>
</body>
</html>
